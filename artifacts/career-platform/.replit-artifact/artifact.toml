kind = "web"
previewPath = "/"
title = "AI Career Platform"
version = "1.0.0"
id = "artifacts/career-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19996

[services.development]
run = "pnpm --filter @workspace/career-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/career-platform", "run", "build" ]
publicDir = "artifacts/career-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19996"
BASE_PATH = "/"
